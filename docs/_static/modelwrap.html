<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CAD Model Viewer</title>
  <style>
    :root {
      --panel-bg: #ffffff;
      --panel-border: rgba(100, 116, 139, 0.35);
      --muted: #475569;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: #fff;
      color: #0f172a;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
    }
    .toolbar {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      padding: 0.7rem 0.85rem;
      border-bottom: 1px solid var(--panel-border);
      background: var(--panel-bg);
      flex-wrap: wrap;
    }
    .toolbar label {
      font-size: 0.84rem;
      font-weight: 600;
      color: var(--muted);
    }
    .toolbar select {
      min-width: 18rem;
      max-width: 100%;
      padding: 0.4rem 0.55rem;
      border-radius: 8px;
      border: 1px solid rgba(100, 116, 139, 0.5);
      background: #fff;
    }
    .spacer {
      flex: 1 1 auto;
    }
    .meta {
      font-size: 0.83rem;
      color: var(--muted);
      width: 100%;
    }
    .toolbar a {
      font-size: 0.84rem;
      text-decoration: none;
    }
    #viewer {
      flex: 1 1 auto;
      min-height: 320px;
      width: 100%;
    }
    .message {
      padding: 1rem;
      color: var(--muted);
    }
    .error {
      color: #b91c1c;
    }
  </style>
  <script src="o3dv/o3dv.min.js"></script>
</head>
<body>
  <div class="toolbar">
    <label for="selector">Model</label>
    <select id="selector"></select>
    <div class="spacer"></div>
    <a id="open-link" href="#" target="_blank" rel="noopener">Open raw file</a>
    <div class="meta" id="meta"></div>
  </div>
  <div id="viewer"></div>
  <script>
    const selector = document.getElementById("selector");
    const meta = document.getElementById("meta");
    const openLink = document.getElementById("open-link");
    const viewerRoot = document.getElementById("viewer");
    const params = new URLSearchParams(window.location.search);
    const defaultCadRoot = "http://meridian.caltech.edu:81/";
    const modelExtensions = new Set([".step", ".stp", ".iges", ".igs", ".stl", ".obj", ".3mf", ".glb", ".gltf"]);
    let activeObjectUrl = null;

    function resolveUrl(value) {
      return new URL(value, window.location.href).toString();
    }

    function isCrossOrigin(url) {
      return new URL(url, window.location.href).origin !== window.location.origin;
    }

    function getExtension(url) {
      const pathname = new URL(url, window.location.href).pathname;
      const dotIndex = pathname.lastIndexOf(".");
      return dotIndex >= 0 ? pathname.slice(dotIndex).toLowerCase() : "";
    }

    function naturalCompare(left, right) {
      return left.localeCompare(right, undefined, { numeric: true, sensitivity: "base" });
    }

    function titleFromPath(path) {
      const filename = decodeURIComponent(path.split("/").pop() || path);
      const stem = filename.replace(/\.[^.]*$/, "");
      return stem.replace(/[_-]+/g, " ").replace(/\s+/g, " ").trim() || filename;
    }

    function normalizeDirectoryUrl(url) {
      const parsed = new URL(url, window.location.href);
      if (!parsed.pathname.endsWith("/")) {
        parsed.pathname += "/";
      }
      return parsed.toString();
    }

    function relativeCadPath(fileUrl, rootUrl) {
      const file = new URL(fileUrl);
      const root = new URL(rootUrl);
      const rootPath = root.pathname.endsWith("/") ? root.pathname : root.pathname + "/";
      let rel = file.pathname.startsWith(rootPath) ? file.pathname.slice(rootPath.length) : file.pathname.replace(/^\/+/, "");
      return decodeURIComponent(rel);
    }

    function fetchErrorDetail(error) {
      return error ? [error.name, error.message].filter(Boolean).join(": ") : "";
    }

    function describeDirectoryFetchFailure(directoryUrl, error) {
      const parsed = new URL(directoryUrl, window.location.href);
      const detail = fetchErrorDetail(error);
      const suffix = detail ? " Browser detail: " + detail + "." : "";

      if (window.location.protocol === "https:" && parsed.protocol === "http:") {
        return (
          "Could not read CAD server listing: " + directoryUrl +
          ". This page is loaded over HTTPS, so the browser blocks insecure HTTP CAD requests as mixed content." +
          " Use an HTTPS CAD URL instead." + suffix
        );
      }

      if (parsed.protocol === "https:" && parsed.hostname === "meridian.caltech.edu") {
        return (
          "Could not read CAD server listing: " + directoryUrl +
          ". Meridian currently uses a self-signed HTTPS certificate, so some browsers block the request before JavaScript can read the response." +
          " Open the CAD server URL directly in this browser, accept or trust the certificate, then reload this page." +
          " If that is not acceptable, the CAD server needs a browser-trusted certificate." + suffix
        );
      }

      return (
        "Could not read CAD server listing: " + directoryUrl +
        ". The browser blocked the request before JavaScript could read the response." +
        " Check the browser Console or Network panel for the exact reason." +
        " If it reports Access-Control-Allow-Origin, the CAD server must allow this site origin." + suffix
      );
    }

    async function readDirectoryLinks(directoryUrl) {
      let response;
      try {
        response = await fetch(directoryUrl, { cache: "no-store" });
      } catch (error) {
        throw new Error(describeDirectoryFetchFailure(directoryUrl, error));
      }
      if (!response.ok) {
        throw new Error(
          "Could not read CAD server listing: " + directoryUrl +
          ". HTTP status: " + response.status + " " + response.statusText + "."
        );
      }
      const html = await response.text();
      const doc = new DOMParser().parseFromString(html, "text/html");
      return Array.from(doc.querySelectorAll("a[href]")).map(link => link.getAttribute("href"));
    }

    async function discoverCadEntries(cadRoot, subdir, extensions) {
      const rootUrl = normalizeDirectoryUrl(cadRoot || defaultCadRoot);
      const cleanSubdir = subdir.replace(/^\/+|\/+$/g, "");
      const startUrl = cleanSubdir ? new URL(cleanSubdir + "/", rootUrl).toString() : rootUrl;
      const pending = [startUrl];
      const visited = new Set();
      const found = new Map();

      while (pending.length > 0) {
        const current = pending.pop();
        if (visited.has(current)) continue;
        visited.add(current);

        const hrefs = await readDirectoryLinks(current);
        for (const href of hrefs) {
          if (!href) continue;
          const cleanHref = href.split("?", 1)[0].split("#", 1)[0];
          if (!cleanHref || cleanHref === "../" || cleanHref === "./") continue;

          const candidate = new URL(cleanHref, current);
          if (!candidate.href.startsWith(rootUrl)) continue;

          const path = relativeCadPath(candidate.href, rootUrl);
          if (!path) continue;

          if (cleanHref.endsWith("/") || candidate.pathname.endsWith("/")) {
            pending.push(candidate.toString());
            continue;
          }

          if (extensions.has(getExtension(candidate.href))) {
            found.set(path, {
              title: titleFromPath(path),
              file: candidate.toString(),
              path,
              source: "remote"
            });
          }
        }
      }

      return Array.from(found.values()).sort((left, right) => naturalCompare(left.title, right.title));
    }

    function releaseObjectUrl() {
      if (activeObjectUrl) {
        URL.revokeObjectURL(activeObjectUrl);
        activeObjectUrl = null;
      }
    }

    function setMessage(message, isError = false) {
      viewerRoot.innerHTML = '<div class="message' + (isError ? ' error' : '') + '">' + message + '</div>';
    }

    function setUnavailable(message) {
      selector.innerHTML = "";
      selector.disabled = true;
      openLink.removeAttribute("href");
      meta.textContent = "";
      releaseObjectUrl();
      setMessage(message, false);
    }

    function humanMeta(entry) {
      const parts = [];
      if (entry.notes) parts.push(entry.notes);
      if (entry.docno) parts.push('Doc: ' + entry.docno);
      return parts.join(' | ');
    }

    function buildViewer(modelUrl) {
      viewerRoot.innerHTML = "";
      const host = document.createElement("div");
      host.style.width = "100%";
      host.style.height = "100%";
      viewerRoot.appendChild(host);

      const viewer = new OV.EmbeddedViewer(host, {
        backgroundColor: new OV.RGBAColor(255, 255, 255, 255),
        defaultColor: new OV.RGBColor(200, 200, 200),
        edgeSettings: new OV.EdgeSettings(false, new OV.RGBColor(0, 0, 0), 1)
      });

      viewer.LoadModelFromUrlList([modelUrl]);
    }

    async function resolveViewerModelUrl(modelUrl) {
      if (!isCrossOrigin(modelUrl)) {
        return modelUrl;
      }

      const extension = getExtension(modelUrl);
      if (extension === ".gltf") {
        return modelUrl;
      }

      const response = await fetch(modelUrl);
      if (!response.ok) {
        throw new Error("Could not load remote model: " + modelUrl);
      }

      releaseObjectUrl();
      activeObjectUrl = URL.createObjectURL(await response.blob());
      return activeObjectUrl;
    }

    function chooseInitial(entries) {
      const requested = params.get("selected") || params.get("model");
      if (!requested) return entries[0];
      return entries.find(entry =>
        entry.file === requested ||
        entry.path === requested ||
        entry.file.endsWith(requested) ||
        entry.title === requested
      ) || entries[0];
    }

    async function update(entries, selectedFile) {
      const entry = entries.find(item => item.file === selectedFile) || entries[0];
      if (!entry) {
        setMessage("No model entries were found.", true);
        return;
      }
      const rawModelUrl = resolveUrl(entry.file);
      releaseObjectUrl();
      const modelUrl = await resolveViewerModelUrl(rawModelUrl);
      openLink.href = rawModelUrl;
      meta.textContent = humanMeta(entry);
      buildViewer(modelUrl);
    }

    async function main() {
      const manifestParam = params.get("manifest");
      const cadRoot = params.get("cadRoot") || defaultCadRoot;
      const directModel = params.get("model");

      let entries = [];
      if (manifestParam) {
        const manifestUrl = resolveUrl(manifestParam);
        const response = await fetch(manifestUrl);
        if (!response.ok) {
          throw new Error("Could not load model manifest: " + manifestUrl);
        }
        entries = await response.json();
      } else if (directModel) {
        entries = [{ title: "Selected model", file: directModel }];
      } else {
        entries = await discoverCadEntries(cadRoot, "", modelExtensions);
      }

      if (!Array.isArray(entries) || entries.length === 0) {
        setUnavailable("No CAD models available.");
        return;
      }

      selector.innerHTML = "";
      for (const entry of entries) {
        const option = document.createElement("option");
        option.value = entry.file;
        option.textContent = entry.title || entry.file.split("/").pop();
        selector.appendChild(option);
      }

      const initial = chooseInitial(entries);
      selector.value = initial.file;
      selector.addEventListener("change", async () => {
        try {
          await update(entries, selector.value);
        } catch (error) {
          console.error(error);
          setMessage(error.message || "Could not load the selected model.", true);
        }
      });
      await update(entries, initial.file);
    }

    main().catch(error => {
      console.error(error);
      setMessage(error.message || "Could not initialize model viewer.", true);
    });
  </script>
</body>
</html>
