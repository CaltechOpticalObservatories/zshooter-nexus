<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CAD Model Viewer</title>
  <style>
    :root {
      --panel-bg: #ffffff;
      --panel-border: rgba(100, 116, 139, 0.35);
      --muted: #475569;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: #fff;
      color: #0f172a;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
    }
    .toolbar {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      padding: 0.7rem 0.85rem;
      border-bottom: 1px solid var(--panel-border);
      background: var(--panel-bg);
      flex-wrap: wrap;
    }
    .toolbar label {
      font-size: 0.84rem;
      font-weight: 600;
      color: var(--muted);
    }
    .toolbar select {
      min-width: 18rem;
      max-width: 100%;
      padding: 0.4rem 0.55rem;
      border-radius: 8px;
      border: 1px solid rgba(100, 116, 139, 0.5);
      background: #fff;
    }
    .spacer {
      flex: 1 1 auto;
    }
    .meta {
      font-size: 0.83rem;
      color: var(--muted);
      width: 100%;
    }
    .toolbar a {
      font-size: 0.84rem;
      text-decoration: none;
    }
    #viewer {
      flex: 1 1 auto;
      min-height: 320px;
      width: 100%;
    }
    .message {
      padding: 1rem;
      color: var(--muted);
    }
    .error {
      color: #b91c1c;
    }
  </style>
  <script src="o3dv/o3dv.min.js"></script>
</head>
<body>
  <div class="toolbar">
    <label for="selector">Model</label>
    <select id="selector"></select>
    <div class="spacer"></div>
    <a id="open-link" href="#" target="_blank" rel="noopener">Open raw file</a>
    <div class="meta" id="meta"></div>
  </div>
  <div id="viewer"></div>
  <script>
    const selector = document.getElementById("selector");
    const meta = document.getElementById("meta");
    const openLink = document.getElementById("open-link");
    const viewerRoot = document.getElementById("viewer");
    const params = new URLSearchParams(window.location.search);
    let activeObjectUrl = null;

    function resolveUrl(value) {
      return new URL(value, window.location.href).toString();
    }

    function isCrossOrigin(url) {
      return new URL(url, window.location.href).origin !== window.location.origin;
    }

    function getExtension(url) {
      const pathname = new URL(url, window.location.href).pathname;
      const dotIndex = pathname.lastIndexOf(".");
      return dotIndex >= 0 ? pathname.slice(dotIndex).toLowerCase() : "";
    }

    function releaseObjectUrl() {
      if (activeObjectUrl) {
        URL.revokeObjectURL(activeObjectUrl);
        activeObjectUrl = null;
      }
    }

    function setMessage(message, isError = false) {
      viewerRoot.innerHTML = '<div class="message' + (isError ? ' error' : '') + '">' + message + '</div>';
    }

    function humanMeta(entry) {
      const parts = [];
      if (entry.notes) parts.push(entry.notes);
      if (entry.docno) parts.push('Doc: ' + entry.docno);
      return parts.join(' | ');
    }

    function buildViewer(modelUrl) {
      viewerRoot.innerHTML = "";
      const host = document.createElement("div");
      host.style.width = "100%";
      host.style.height = "100%";
      viewerRoot.appendChild(host);

      const viewer = new OV.EmbeddedViewer(host, {
        backgroundColor: new OV.RGBAColor(255, 255, 255, 255),
        defaultColor: new OV.RGBColor(200, 200, 200),
        edgeSettings: new OV.EdgeSettings(false, new OV.RGBColor(0, 0, 0), 1)
      });

      viewer.LoadModelFromUrlList([modelUrl]);
    }

    async function resolveViewerModelUrl(modelUrl) {
      if (!isCrossOrigin(modelUrl)) {
        return modelUrl;
      }

      const extension = getExtension(modelUrl);
      if (extension === ".gltf") {
        return modelUrl;
      }

      const response = await fetch(modelUrl);
      if (!response.ok) {
        throw new Error("Could not load remote model: " + modelUrl);
      }

      releaseObjectUrl();
      activeObjectUrl = URL.createObjectURL(await response.blob());
      return activeObjectUrl;
    }

    function chooseInitial(entries) {
      const requested = params.get("selected") || params.get("model");
      if (!requested) return entries[0];
      return entries.find(entry =>
        entry.file === requested ||
        entry.path === requested ||
        entry.file.endsWith(requested) ||
        entry.title === requested
      ) || entries[0];
    }

    async function update(entries, selectedFile) {
      const entry = entries.find(item => item.file === selectedFile) || entries[0];
      if (!entry) {
        setMessage("No model entries were found.", true);
        return;
      }
      const rawModelUrl = resolveUrl(entry.file);
      releaseObjectUrl();
      const modelUrl = await resolveViewerModelUrl(rawModelUrl);
      openLink.href = rawModelUrl;
      meta.textContent = humanMeta(entry);
      buildViewer(modelUrl);
    }

    async function main() {
      const manifestParam = params.get("manifest") || "generated/models.generated.json";
      const directModel = params.get("model");

      let entries = [];
      if (manifestParam) {
        const manifestUrl = resolveUrl(manifestParam);
        const response = await fetch(manifestUrl);
        if (!response.ok) {
          throw new Error("Could not load model manifest: " + manifestUrl);
        }
        entries = await response.json();
      } else if (directModel) {
        entries = [{ title: "Selected model", file: directModel }];
      }

      if (!Array.isArray(entries) || entries.length === 0) {
        setMessage("No model selected. Pass ?manifest=... or ?model=...", true);
        selector.disabled = true;
        return;
      }

      selector.innerHTML = "";
      for (const entry of entries) {
        const option = document.createElement("option");
        option.value = entry.file;
        option.textContent = entry.title || entry.file.split("/").pop();
        selector.appendChild(option);
      }

      const initial = chooseInitial(entries);
      selector.value = initial.file;
      selector.addEventListener("change", async () => {
        try {
          await update(entries, selector.value);
        } catch (error) {
          console.error(error);
          setMessage(error.message || "Could not load the selected model.", true);
        }
      });
      await update(entries, initial.file);
    }

    main().catch(error => {
      console.error(error);
      setMessage(error.message || "Could not initialize model viewer.", true);
    });
  </script>
</body>
</html>
