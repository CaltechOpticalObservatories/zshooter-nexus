<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Architecture Viewer</title>
  <style>
    :root {
      --panel-bg: #ffffff;
      --panel-border: rgba(100, 116, 139, 0.35);
      --muted: #475569;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: #fff;
      color: #0f172a;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
    }
    .toolbar {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      padding: 0.7rem 0.85rem;
      border-bottom: 1px solid var(--panel-border);
      background: var(--panel-bg);
      flex-wrap: wrap;
    }
    .toolbar label {
      font-size: 0.84rem;
      font-weight: 600;
      color: var(--muted);
    }
    .toolbar select {
      min-width: 18rem;
      max-width: 100%;
      padding: 0.4rem 0.55rem;
      border-radius: 8px;
      border: 1px solid rgba(100, 116, 139, 0.5);
      background: #fff;
    }
    .spacer {
      flex: 1 1 auto;
    }
    .meta {
      font-size: 0.83rem;
      color: var(--muted);
      width: 100%;
    }
    .toolbar a {
      font-size: 0.84rem;
      text-decoration: none;
    }
    #viewer-frame {
      border: 0;
      width: 100%;
      flex: 1 1 auto;
      min-height: 320px;
      background: white;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <label for="selector">Diagram</label>
    <select id="selector"></select>
    <div class="spacer"></div>
    <a id="open-link" href="#" target="_blank" rel="noopener">Open raw file</a>
    <div class="meta" id="meta"></div>
  </div>
  <iframe id="viewer-frame" title="Architecture viewer"></iframe>

  <script>
    const selector = document.getElementById("selector");
    const meta = document.getElementById("meta");
    const openLink = document.getElementById("open-link");
    const viewerFrame = document.getElementById("viewer-frame");
    const params = new URLSearchParams(window.location.search);

    function resolveUrl(value) {
      return new URL(value, window.location.href).toString();
    }

    function ensureTrailingSlash(value) {
      return value.endsWith("/") ? value : value + "/";
    }

    function titleFromPath(path) {
      const file = path.split("/").pop() || path;
      return file
        .replace(/\.svg$/i, "")
        .replace(/[_-]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function chooseInitial(entries) {
      const requested = params.get("selected") || params.get("svg");
      if (!requested) return entries[0];
      return entries.find(entry =>
        entry.file === requested ||
        entry.file.endsWith(requested) ||
        entry.title === requested
      ) || entries[0];
    }

    function update(entries, selectedFile) {
      const entry = entries.find(item => item.file === selectedFile) || entries[0];
      if (!entry) return;

      const svgUrl = resolveUrl(entry.file);
      openLink.href = svgUrl;
      meta.textContent = entry.file;
      viewerFrame.src = svgUrl;
    }

    async function discoverSvgEntries(folderParam) {
      const folderUrl = resolveUrl(ensureTrailingSlash(folderParam));
      const response = await fetch(folderUrl);
      if (!response.ok) {
        throw new Error("Could not load directory listing: " + folderUrl);
      }

      const text = await response.text();
      const parser = new DOMParser();
      const doc = parser.parseFromString(text, "text/html");
      const links = Array.from(doc.querySelectorAll('a[href]'));
      const seen = new Set();
      const entries = [];

      for (const link of links) {
        const href = link.getAttribute('href');
        if (!href) continue;
        if (!/\.svg(?:\?.*)?$/i.test(href)) continue;

        const fullUrl = new URL(href, folderUrl);
        const sameFolder = fullUrl.pathname.startsWith(new URL(folderUrl).pathname);
        if (!sameFolder) continue;

        const relative = decodeURIComponent(fullUrl.pathname.split('/').pop() || '');
        if (!relative || seen.has(relative)) continue;
        seen.add(relative);

        entries.push({
          title: titleFromPath(relative),
          file: ensureTrailingSlash(folderParam) + relative,
        });
      }

      entries.sort((a, b) => a.title.localeCompare(b.title, undefined, { numeric: true, sensitivity: 'base' }));
      return entries;
    }

    async function main() {
      const folderParam = params.get("folder") || "d2_diagrams/";
      const directSvg = params.get("svg");

      let entries = [];
      if (directSvg) {
        entries = [{ title: titleFromPath(directSvg), file: directSvg }];
      } else {
        entries = await discoverSvgEntries(folderParam);
      }

      if (!Array.isArray(entries) || entries.length === 0) {
        document.body.innerHTML = '<p style="padding:1rem;color:#b91c1c">No SVG diagrams found. This wrapper expects a browseable directory listing for the target folder, for example <code>?folder=d2_diagrams/</code>.</p>';
        return;
      }

      selector.innerHTML = "";
      for (const entry of entries) {
        const option = document.createElement("option");
        option.value = entry.file;
        option.textContent = entry.title || entry.file.split("/").pop();
        selector.appendChild(option);
      }

      const initial = chooseInitial(entries);
      selector.value = initial.file;
      selector.addEventListener("change", () => update(entries, selector.value));
      update(entries, initial.file);
    }

    main().catch(error => {
      console.error(error);
      document.body.innerHTML = '<p style="padding:1rem;color:#b91c1c">' + (error.message || 'Could not initialize architecture viewer.') + '</p>';
    });
  </script>
</body>
</html>
