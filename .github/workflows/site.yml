name: Build and deploy portal

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Detect D2 changes
        id: detect_d2
        run: >
          bash tools/detect_d2_changes.sh
          "${{ github.event_name }}"
          "${{ github.event.before }}"
          "${{ github.sha }}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Pandoc
        uses: pandoc/actions/setup@v1
        with:
          version: 2.19

      - name: Install D2
        if: steps.detect_d2.outputs.render == 'true'
        run: |
          curl -fsSL https://d2lang.com/install.sh | sh -s --
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Stage Site
        run: python tools/stage_site.py

      - name: Generate CAD Manifest
        run: python tools/generate_cad_manifest.py --cad-root ./cad --docs-root ./docs --web-root ../cad

      - name: Render D2
        if: steps.detect_d2.outputs.render == 'true'
        run: bash tools/render_d2.sh

      - name: Log D2 SVG drift
        if: steps.detect_d2.outputs.render == 'true'
        run: bash tools/log_d2_drift.sh

      - name: Sync D2 SVGs
        run: bash tools/sync_d2_svgs.sh

      - name: Build Sphinx
        run:  sphinx-build -b html docs docs/_build/html

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_build/html

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
